name: Send image to docker hub

on:
  push:
    branches:
      - feature-ci/added-check-style-plugin
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: nbank-tests
  DOCKER_REGISTRY_URL: docker.io

jobs:
  run-tests:
    name: Build project, check code style and push docker image to docker hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Cache Maven repository # cache maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{runner.os}}--maven-${{ hashFiles('**/pom.xml')}}
          restore-keys:
            ${{ runner.os }}--maven-

      - name: Build project  #build project and skip tst execution
        run: mvn clean install -Dmaven.test.skip=true

      - name: Log in to Docker Hub #login to docker hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image #push to docker hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
