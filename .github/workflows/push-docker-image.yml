name: Send image to docker hub

# Workflow environment variables
env:
  DOCKER_IMAGE_NAME: nbank-tests
  DOCKER_REGISTRY_URL: docker.io

#trigger
on:
  push:
    paths:
      - 'src/**'
  workflow_dispatch:

#Workflow definition
jobs:
  run-tests:
    name: Build project, check code style and push docker image to docker hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository #download code to runner
        uses: actions/checkout@v4

      - name: Set up JDK #setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Build project # Build project and check code style
        run: mvn clean install

      - name: Log in to the Container registry # Login to docker hub
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ env.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image (commit SHA only) #push to docker hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
